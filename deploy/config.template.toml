# ZeroClaw Config Template
#
# Secrets use ${VAR} placeholders — substituted at container startup via envsubst.
# Non-secret values are hardcoded here. Edit this file directly for config changes.
#
# Sections omitted here use built-in defaults. Only override what you need.

workspace_dir = "/zeroclaw-data/workspace"
config_path = "/zeroclaw-data/.zeroclaw/config.toml"
api_key = "${API_KEY}"
default_provider = "custom:http://host.docker.internal:8765/v1"
default_model = "claude-sonnet-4.6"
default_temperature = 0.7

# ── Gateway ──────────────────────────────────────────────────────

[gateway]
port = 42617
host = "0.0.0.0"
allow_public_bind = true

# ── Memory ───────────────────────────────────────────────────────

[memory]
backend = "markdown"
auto_save = true

# ── Agent Orchestration ──────────────────────────────────────────

[agent]
compact_context = false
max_tool_iterations = 20
max_history_messages = 50
parallel_tools = false
safety_heartbeat_interval = 5

[agent.session]
backend = "sqlite"
strategy = "per-sender"
ttl_seconds = 3600
max_messages = 50

[agent.teams]
enabled = true
auto_activate = true
max_agents = 32
strategy = "adaptive"

[agent.subagents]
enabled = true
auto_activate = true
max_concurrent = 10

# ── Delegate Agents ──────────────────────────────────────────────

[agents.researcher]
provider = "custom:http://host.docker.internal:8765/v1"
model = "claude-haiku-4.5"
system_prompt = "You are a research specialist. Provide thorough, well-sourced analysis. Focus on accuracy and completeness. Be concise."
capabilities = ["research", "analysis", "summary", "triage"]
priority = 1
temperature = 0.5
max_depth = 3

[agents.coder]
provider = "custom:http://host.docker.internal:8765/v1"
model = "claude-sonnet-4.6"
system_prompt = "You are a coding specialist. Write clean, correct, minimal code. Follow existing patterns. No unnecessary abstractions."
capabilities = ["coding", "refactor", "debug", "review"]
priority = 1
temperature = 0.2
max_depth = 2

[agents.reasoner]
provider = "custom:http://host.docker.internal:8765/v1"
model = "claude-opus-4.6"
system_prompt = "You are a deep reasoning specialist. Think step by step. Consider edge cases. Provide thorough analysis with clear conclusions."
capabilities = ["reasoning", "architecture", "security", "planning"]
priority = 0
temperature = 0.3
max_depth = 1

# ── Coordination ─────────────────────────────────────────────────

[coordination]
enabled = true
lead_agent = "delegate-lead"

# ── Model Routing ────────────────────────────────────────────────

[[model_routes]]
hint = "fast"
provider = "custom:http://host.docker.internal:8765/v1"
model = "claude-haiku-4.5"

[[model_routes]]
hint = "reasoning"
provider = "custom:http://host.docker.internal:8765/v1"
model = "claude-opus-4.6"

# ── Autonomy ─────────────────────────────────────────────────────

[autonomy]
level = "full"
workspace_only = true
allowed_commands = ["*"]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "/mnt",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
max_actions_per_hour = 100000
max_cost_per_day_cents = 10000000

# ── MCP Servers ────────────────────────────────────────────────────
# Tools from MCP servers register as <server_name>__<tool_name>.
# For Docker: prefer http/sse transports. Stdio needs binaries in the container.

[mcp]
enabled = true

# Example: HTTP transport (cleanest for Docker)
# [[mcp.servers]]
# name = "my-api"
# transport = "http"
# url = "http://host.docker.internal:3001/mcp"
# headers = { Authorization = "Bearer ${MCP_API_KEY}" }
# tool_timeout_secs = 30

# Example: SSE transport
# [[mcp.servers]]
# name = "my-sse"
# transport = "sse"
# url = "http://host.docker.internal:3002/sse"

# Example: Stdio transport (requires binary in container)
# [[mcp.servers]]
# name = "filesystem"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/zeroclaw-data/workspace"]

[[mcp.servers]]
name = "github"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }

[[mcp.servers]]
name = "exa"
transport = "sse"
url = "https://mcp.exa.ai/mcp"
tool_timeout_secs = 30

# ── Channels ─────────────────────────────────────────────────────

[channels_config]
cli = false

[channels_config.telegram]
bot_token = "${TELEGRAM_BOT_TOKEN}"
allowed_users = ["*"]
stream_mode = "off"
mention_only = true
parse_mode = "HTML"
interrupt_on_new_message = false
ack_enabled = true

