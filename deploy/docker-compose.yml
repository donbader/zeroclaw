# ZeroClaw — Dokploy-ready Docker Compose
#
# Usage:
#   cd deploy && ./deploy.sh        (builds base + deploys)
#   cd deploy && ./deploy.sh down   (stops everything)
#
# Manual two-step:
#   docker build -t zeroclaw:dev --target dev -f ../Dockerfile ..
#   docker compose up --build -d

services:
  zeroclaw:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: zeroclaw
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - zeroclaw-data:/zeroclaw-data
    ports:
      - "${HOST_PORT:-42617}:42617"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data:
