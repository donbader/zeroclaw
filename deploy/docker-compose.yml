# ZeroClaw — Dokploy-ready Docker Compose
#
# Set environment variables in Dokploy's UI, or create a .env file:
#
#   API_KEY=your-openrouter-or-provider-api-key
#   TELEGRAM_BOT_TOKEN=123456:your-telegram-bot-token
#
# Then: docker compose up -d

services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroclaw
    restart: unless-stopped

    environment:
      # ── Required ──────────────────────────────────────────
      - API_KEY=${API_KEY:?Set your LLM provider API key}

      # ── LLM Provider ─────────────────────────────────────
      - PROVIDER=${PROVIDER:-openrouter}
      - ZEROCLAW_MODEL=${ZEROCLAW_MODEL:-anthropic/claude-sonnet-4-20250514}
      - ZEROCLAW_TEMPERATURE=${ZEROCLAW_TEMPERATURE:-0.7}
      - ZEROCLAW_MEMORY_BACKEND=${ZEROCLAW_MEMORY_BACKEND:-markdown}

      # ── Gateway ───────────────────────────────────────────
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}

      # ── Telegram (set TELEGRAM_BOT_TOKEN to enable) ──────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-*}
      - TELEGRAM_STREAM_MODE=${TELEGRAM_STREAM_MODE:-off}
      - TELEGRAM_MENTION_ONLY=${TELEGRAM_MENTION_ONLY:-false}
      - TELEGRAM_INTERRUPT=${TELEGRAM_INTERRUPT:-false}
      - TELEGRAM_ACK_ENABLED=${TELEGRAM_ACK_ENABLED:-true}
      - TELEGRAM_GROUP_REPLY_MODE=${TELEGRAM_GROUP_REPLY_MODE:-}

      # ── Discord (set DISCORD_BOT_TOKEN to enable) ────────
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS:-*}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}

      # ── Escape hatch: raw TOML appended to config ────────
      - ZEROCLAW_EXTRA_CONFIG=${ZEROCLAW_EXTRA_CONFIG:-}

    volumes:
      - zeroclaw-data:/zeroclaw-data

    ports:
      - "${HOST_PORT:-42617}:${ZEROCLAW_GATEWAY_PORT:-42617}"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data:
